<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full-page dot concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Space+Grotesk:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    /* dot background across the ENTIRE page */
    background-color: #ffffff;
    background-image: radial-gradient(
      circle at 1px 1px,
      rgba(0, 0, 0, 0.18) 1.5px,
      transparent 0
    );
    background-size: 24px 24px;
    font-family: 'Space Grotesk', sans-serif;
  }

  .page {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    width: 100vw;
  }

  /* ── Header ── */
  .header {
    padding: 28px 40px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    background: rgba(255, 255, 255, 0.6);
  }

  .site-title {
    font-family: 'Caveat', cursive;
    font-size: 4.8rem;
    color: #E8631A;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .site-date {
    font-family: 'Caveat', cursive;
    font-size: 1.4rem;
    color: #E8631A;
    opacity: 0.6;
    margin-top: 0;
  }

  /* ── Stage: stickers overlapping ── */
  .stage {
    position: relative;
    overflow: hidden;
  }

  .sticker {
    position: absolute;
    filter: drop-shadow(2px 4px 0px rgba(232,99,26,0.22));
    z-index: 2;
  }

  /* Tighter, overlapping positions */
  .s1 { top: 2%;   left: 5%;   transform: rotate(-7deg);  width: 38%; z-index: 3; }
  .s2 { top: 0%;   left: 35%;  transform: rotate(4deg);   width: 28%; z-index: 4; }
  .s3 { top: 1%;   right: 3%;  transform: rotate(-5deg);  width: 30%; z-index: 2; }
  .s4 { top: 38%;  left: -2%;  transform: rotate(9deg);   width: 26%; z-index: 5; }
  .s5 { top: 32%;  left: 22%;  transform: rotate(-4deg);  width: 40%; z-index: 3; }
  .s6 { top: 35%;  right: 2%;  transform: rotate(6deg);   width: 27%; z-index: 4; }
  .s7 { bottom: 2%;left: 3%;   transform: rotate(-3deg);  width: 32%; z-index: 3; }
  .s8 { bottom: 0%;left: 28%;  transform: rotate(8deg);   width: 30%; z-index: 5; }
  .s9 { bottom: 1%;right: 4%;  transform: rotate(-9deg);  width: 24%; z-index: 4; }

  /* ── Bottom nav ── */
  .nav {
    padding: 18px 40px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.6);
  }

  /* Hand-drawn style arrows — SVG inline */
  .arrow-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    transition: transform 0.12s cubic-bezier(.34,1.56,.64,1);
    user-select: none;
  }
  .arrow-btn:hover { transform: scale(1.12); }
  .arrow-btn svg { overflow: visible; }

  .arrow-label {
    font-family: 'Caveat', cursive;
    font-size: 1.6rem;
    color: #E8631A;
    line-height: 1;
  }

  .nav-date {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: #E8631A;
    opacity: 0.55;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="site-title">оранжевые кляксы</div>
  </header>

  <!-- STAGE -->
  <main class="stage">

    <!-- Клякса с лицом -->
    <svg class="sticker s1" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 160 C10 140 0 100 15 65 C30 30 70 10 110 20 C150 30 190 20 205 55 C220 90 200 140 175 165 C150 190 70 180 40 160Z"
        fill="#E8631A" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
      <circle cx="85"  cy="90" r="11" fill="#fff"/>
      <circle cx="88"  cy="90" r="5"  fill="#E8631A"/>
      <circle cx="135" cy="85" r="11" fill="#fff"/>
      <circle cx="138" cy="85" r="5"  fill="#E8631A"/>
      <path d="M90 125 Q110 145 130 125" fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M75 76 Q85 70 95 76"   fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <path d="M125 72 Q135 66 145 72" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </svg>

    <!-- Кот -->
    <svg class="sticker s2" viewBox="0 0 160 150" xmlns="http://www.w3.org/2000/svg">
      <polygon points="25,70 10,10 55,45"  fill="#E8631A" stroke="#fff" stroke-width="5.5" stroke-linejoin="round"/>
      <polygon points="135,70 150,10 105,45" fill="#E8631A" stroke="#fff" stroke-width="5.5" stroke-linejoin="round"/>
      <ellipse cx="80" cy="90" rx="65" ry="58" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
      <ellipse cx="55" cy="80" rx="12" ry="14" fill="#fff"/>
      <ellipse cx="57" cy="80" rx="6"  ry="10" fill="#E8631A"/>
      <ellipse cx="105" cy="80" rx="12" ry="14" fill="#fff"/>
      <ellipse cx="107" cy="80" rx="6"  ry="10" fill="#E8631A"/>
      <polygon points="80,100 73,112 87,112" fill="#fff"/>
      <line x1="20" y1="108" x2="68"  y2="112" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="118" x2="68"  y2="118" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="92" y1="112" x2="140" y2="108" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="92" y1="118" x2="140" y2="118" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </svg>

    <!-- Речевой пузырь -->
    <svg class="sticker s3" viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 10 Q10 10 10 20 L10 130 Q10 140 20 140 L90 140 L80 180 L130 140 L260 140 Q270 140 270 130 L270 20 Q270 10 260 10 Z"
        fill="#E8631A" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
      <circle cx="90"  cy="75" r="15" fill="#fff"/>
      <circle cx="140" cy="75" r="15" fill="#fff"/>
      <circle cx="190" cy="75" r="15" fill="#fff"/>
    </svg>

    <!-- Молния -->
    <svg class="sticker s4" viewBox="0 0 80 140" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,5 15,75 40,75 30,135 65,60 38,60 55,5"
        fill="#E8631A" stroke="#fff" stroke-width="5.5" stroke-linejoin="round"/>
    </svg>

    <!-- Звезда -->
    <svg class="sticker s5" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"
        fill="#E8631A" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
    </svg>

    <!-- Круг с X -->
    <svg class="sticker s6" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <path d="M80 10 C130 10 155 40 150 80 C145 120 120 155 80 150 C40 145 10 120 10 80 C10 40 30 10 80 10Z"
        fill="#E8631A" stroke="#fff" stroke-width="6"/>
      <line x1="50" y1="50" x2="110" y2="110" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
      <line x1="110" y1="50" x2="50"  y2="110" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    </svg>

    <!-- Рука -->
    <svg class="sticker s7" viewBox="0 0 140 180" xmlns="http://www.w3.org/2000/svg">
      <rect x="25" y="90" width="90" height="80" rx="15" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
      <rect x="28" y="30" width="22" height="72" rx="11" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
      <rect x="55" y="15" width="22" height="84" rx="11" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
      <rect x="82" y="22" width="22" height="76" rx="11" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
      <rect x="5"  y="70" width="22" height="56" rx="11" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
    </svg>

    <!-- Сердце -->
    <svg class="sticker s8" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
      <path d="M60 95 C60 95 10 60 10 30 C10 10 25 5 40 10 C50 14 60 25 60 25 C60 25 70 14 80 10 C95 5 110 10 110 30 C110 60 60 95 60 95Z"
        fill="#E8631A" stroke="#fff" stroke-width="6.5" stroke-linejoin="round"/>
    </svg>

    <!-- Глаз -->
    <svg class="sticker s9" viewBox="0 0 150 90" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 45 C30 10 120 10 140 45 C120 80 30 80 10 45Z"
        fill="#E8631A" stroke="#fff" stroke-width="5.5" stroke-linejoin="round"/>
      <circle cx="75" cy="45" r="22" fill="#fff"/>
      <circle cx="75" cy="45" r="13" fill="#E8631A"/>
      <circle cx="80" cy="40" r="4"  fill="#fff"/>
    </svg>

  </main>

  <!-- BOTTOM NAV — hand-drawn arrows -->
  <nav class="nav">
    <!-- Left arrow: hand-drawn SVG + label -->
    <button class="arrow-btn" aria-label="вчера">
      <svg width="60" height="36" viewBox="0 0 72 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M68 20 C55 18 38 22 12 20" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
        <path d="M12 20 C18 12 22 8 26 4" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
        <path d="M12 20 C18 28 22 32 26 36" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <span class="arrow-label">вчера</span>
    </button>

    <!-- Center date -->
    <span class="nav-date">25 · 05 · 2026</span>

    <!-- Right arrow: hand-drawn SVG + label -->
    <button class="arrow-btn" aria-label="завтра">
      <span class="arrow-label">завтра</span>
      <svg width="60" height="36" viewBox="0 0 72 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 20 C17 22 34 18 60 20" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
        <path d="M60 20 C54 12 50 8 46 4" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
        <path d="M60 20 C54 28 50 32 46 36" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </button>
  </nav>

</div>
</body>
</html>
