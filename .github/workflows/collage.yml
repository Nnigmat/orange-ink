name: Generate Daily Collage

on:
  schedule:
    - cron: '49 23 * * 1'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD, should be a Monday). Leave empty for today.'
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate collage
        run: python scripts/generate.py ${{ github.event.inputs.date || '' }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collages/
          if git diff --staged --quiet; then
            echo "Collage unchanged, skipping commit."
          else
            INPUT_DATE="${{ github.event.inputs.date }}"
            DATE="${INPUT_DATE:-$(date -u +%Y-%m-%d)}"
            git commit -m "collage: ${DATE} (light + dark)"
            git push
          fi
