<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>оранжевые кляксы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">

    <!-- HEADER -->
    <header class="section header-section">
      <button class="theme-toggle" id="theme-toggle" aria-label="переключить тему">
        <!-- Sun (light mode) -->
        <svg class="icon-sun" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="5.5" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M14 3.5V5.5" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M14 22.5V24.5" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M3.5 14H5.5" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M22.5 14H24.5" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M7.05 7.05L8.46 8.46" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M19.54 19.54L20.95 20.95" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M20.95 7.05L19.54 8.46" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M8.46 19.54L7.05 20.95" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <!-- Moon (dark mode) -->
        <svg class="icon-moon" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 15.5C20.5 19.5 16.5 22.5 12 22C7 21.5 3.5 17.5 4 12.5C4.5 8.5 7 5.5 11 4.5C9 7.5 9 12 12.5 15C16 18 20.5 17.5 22 15.5Z" stroke="#E8631A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="site-title">оранжевые кляксы</h1>
    </header>

    <hr class="divider">

    <!-- COLLAGE STAGE -->
    <section class="section stage-section">
      <div class="stage" id="stage">
        <!-- Real collage image (hidden until loaded) -->
        <img id="collage" alt="коллаж дня" style="display:none">

        <!-- SVG sticker placeholder (shown when no collage) -->
        <div class="stickers" id="stickers">
          <!-- Клякса с лицом -->
          <svg class="sticker s1" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M40 160 C10 140 0 100 15 65 C30 30 70 10 110 20 C150 30 190 20 205 55 C220 90 200 140 175 165 C150 190 70 180 40 160Z" fill="#E8631A" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
            <circle cx="85" cy="90" r="11" fill="#fff"/>
            <circle cx="88" cy="90" r="5" fill="#E8631A"/>
            <circle cx="135" cy="85" r="11" fill="#fff"/>
            <circle cx="138" cy="85" r="5" fill="#E8631A"/>
            <path d="M90 125 Q110 145 130 125" fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round"/>
            <path d="M75 76 Q85 70 95 76" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            <path d="M125 72 Q135 66 145 72" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <!-- Кот -->
          <svg class="sticker s2" viewBox="0 0 160 150" xmlns="http://www.w3.org/2000/svg">
            <polygon points="25,70 10,10 55,45" fill="#E8631A" stroke="#fff" stroke-width="5.5" stroke-linejoin="round"/>
            <polygon points="135,70 150,10 105,45" fill="#E8631A" stroke="#fff" stroke-width="5.5" stroke-linejoin="round"/>
            <ellipse cx="80" cy="90" rx="65" ry="58" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
            <ellipse cx="55" cy="80" rx="12" ry="14" fill="#fff"/>
            <ellipse cx="57" cy="80" rx="6" ry="10" fill="#E8631A"/>
            <ellipse cx="105" cy="80" rx="12" ry="14" fill="#fff"/>
            <ellipse cx="107" cy="80" rx="6" ry="10" fill="#E8631A"/>
            <polygon points="80,100 73,112 87,112" fill="#fff"/>
            <line x1="20" y1="108" x2="68" y2="112" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <line x1="20" y1="118" x2="68" y2="118" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <line x1="92" y1="112" x2="140" y2="108" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <line x1="92" y1="118" x2="140" y2="118" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <!-- Речевой пузырь -->
          <svg class="sticker s3" viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 10 Q10 10 10 20 L10 130 Q10 140 20 140 L90 140 L80 180 L130 140 L260 140 Q270 140 270 130 L270 20 Q270 10 260 10 Z" fill="#E8631A" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
            <circle cx="90" cy="75" r="15" fill="#fff"/>
            <circle cx="140" cy="75" r="15" fill="#fff"/>
            <circle cx="190" cy="75" r="15" fill="#fff"/>
          </svg>
          <!-- Молния -->
          <svg class="sticker s4" viewBox="0 0 80 140" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,5 15,75 40,75 30,135 65,60 38,60 55,5" fill="#E8631A" stroke="#fff" stroke-width="5.5" stroke-linejoin="round"/>
          </svg>
          <!-- Звезда -->
          <svg class="sticker s5" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#E8631A" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
          </svg>
          <!-- Круг с X -->
          <svg class="sticker s6" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
            <path d="M80 10 C130 10 155 40 150 80 C145 120 120 155 80 150 C40 145 10 120 10 80 C10 40 30 10 80 10Z" fill="#E8631A" stroke="#fff" stroke-width="6"/>
            <line x1="50" y1="50" x2="110" y2="110" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
            <line x1="110" y1="50" x2="50" y2="110" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
          </svg>
          <!-- Рука -->
          <svg class="sticker s7" viewBox="0 0 140 180" xmlns="http://www.w3.org/2000/svg">
            <rect x="25" y="90" width="90" height="80" rx="15" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
            <rect x="28" y="30" width="22" height="72" rx="11" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
            <rect x="55" y="15" width="22" height="84" rx="11" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
            <rect x="82" y="22" width="22" height="76" rx="11" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
            <rect x="5" y="70" width="22" height="56" rx="11" fill="#E8631A" stroke="#fff" stroke-width="5.5"/>
          </svg>
          <!-- Сердце -->
          <svg class="sticker s8" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 95 C60 95 10 60 10 30 C10 10 25 5 40 10 C50 14 60 25 60 25 C60 25 70 14 80 10 C95 5 110 10 110 30 C110 60 60 95 60 95Z" fill="#E8631A" stroke="#fff" stroke-width="6.5" stroke-linejoin="round"/>
          </svg>
          <!-- Глаз -->
          <svg class="sticker s9" viewBox="0 0 150 90" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 45 C30 10 120 10 140 45 C120 80 30 80 10 45Z" fill="#E8631A" stroke="#fff" stroke-width="5.5" stroke-linejoin="round"/>
            <circle cx="75" cy="45" r="22" fill="#fff"/>
            <circle cx="75" cy="45" r="13" fill="#E8631A"/>
            <circle cx="80" cy="40" r="4" fill="#fff"/>
          </svg>
        </div>
      </div>
    </section>

    <hr class="divider">

    <!-- NAV -->
    <nav class="section nav-section">
      <button class="arrow-btn" id="btn-prev" aria-label="вчера">
        <svg width="56" height="34" viewBox="0 0 72 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M68 20 C55 18 38 22 12 20" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
          <path d="M12 20 C18 12 22 8 26 4" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
          <path d="M12 20 C18 28 22 32 26 36" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <span class="arrow-label">вчера</span>
      </button>
      <span class="nav-date" id="nav-date"></span>
      <button class="arrow-btn" id="btn-next" aria-label="завтра">
        <span class="arrow-label">завтра</span>
        <svg width="56" height="34" viewBox="0 0 72 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 20 C17 22 34 18 60 20" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
          <path d="M60 20 C54 12 50 8 46 4" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
          <path d="M60 20 C54 28 50 32 46 36" stroke="#E8631A" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </button>
    </nav>

    <hr class="divider">

    <!-- LOOPER -->
    <section class="section looper-section">
      <h2 class="section-title">лупер</h2>

      <div class="tracks">
        <!-- Track 1 -->
        <div class="track">
          <button class="track-btn record-btn" aria-label="запись дорожки 1">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 6 C30 5 39 10 40 18 C42 28 35 38 26 40 C16 42 6 36 5 26 C3 15 12 7 22 6Z" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <circle cx="22" cy="22" r="7" fill="currentColor"/>
            </svg>
          </button>
          <div class="waveform-area">
            <canvas class="waveform-canvas" width="300" height="48"></canvas>
            <span class="waveform-hint">нет записи</span>
          </div>
          <button class="track-btn mute-btn" aria-label="заглушить дорожку 1">
            <span>М</span>
          </button>
        </div>
        <!-- Track 2 -->
        <div class="track">
          <button class="track-btn record-btn" aria-label="запись дорожки 2">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 6 C30 5 39 10 40 18 C42 28 35 38 26 40 C16 42 6 36 5 26 C3 15 12 7 22 6Z" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <circle cx="22" cy="22" r="7" fill="currentColor"/>
            </svg>
          </button>
          <div class="waveform-area">
            <canvas class="waveform-canvas" width="300" height="48"></canvas>
            <span class="waveform-hint">нет записи</span>
          </div>
          <button class="track-btn mute-btn" aria-label="заглушить дорожку 2">
            <span>М</span>
          </button>
        </div>
        <!-- Track 3 -->
        <div class="track">
          <button class="track-btn record-btn" aria-label="запись дорожки 3">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 6 C30 5 39 10 40 18 C42 28 35 38 26 40 C16 42 6 36 5 26 C3 15 12 7 22 6Z" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <circle cx="22" cy="22" r="7" fill="currentColor"/>
            </svg>
          </button>
          <div class="waveform-area">
            <canvas class="waveform-canvas" width="300" height="48"></canvas>
            <span class="waveform-hint">нет записи</span>
          </div>
          <button class="track-btn mute-btn" aria-label="заглушить дорожку 3">
            <span>М</span>
          </button>
        </div>
        <!-- Track 4 -->
        <div class="track">
          <button class="track-btn record-btn" aria-label="запись дорожки 4">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 6 C30 5 39 10 40 18 C42 28 35 38 26 40 C16 42 6 36 5 26 C3 15 12 7 22 6Z" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <circle cx="22" cy="22" r="7" fill="currentColor"/>
            </svg>
          </button>
          <div class="waveform-area">
            <canvas class="waveform-canvas" width="300" height="48"></canvas>
            <span class="waveform-hint">нет записи</span>
          </div>
          <button class="track-btn mute-btn" aria-label="заглушить дорожку 4">
            <span>М</span>
          </button>
        </div>
      </div>

      <!-- Transport -->
      <div class="transport">
        <button class="transport-btn" aria-label="воспроизведение">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 4 C32 4 40 12 40 22 C40 32 32 40 22 40 C12 40 4 32 4 22 C4 12 12 4 22 4Z" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <path d="M18 15 L30 22 L18 29 Z" fill="currentColor"/>
          </svg>
        </button>
        <button class="transport-btn" aria-label="стоп">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 4 C32 4 40 12 40 22 C40 32 32 40 22 40 C12 40 4 32 4 22 C4 12 12 4 22 4Z" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <rect x="15" y="15" width="14" height="14" fill="currentColor"/>
          </svg>
        </button>
        <button class="transport-btn" aria-label="очистить">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 4 C32 4 40 12 40 22 C40 32 32 40 22 40 C12 40 4 32 4 22 C4 12 12 4 22 4Z" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <path d="M16 16 L28 28 M28 16 L16 28" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="transport-controls">
          <label class="transport-label">
            <span class="transport-label-text">bpm</span>
            <input class="bpm-input" type="number" value="120" min="40" max="300" aria-label="BPM">
          </label>
          <div class="loop-length">
            <span class="transport-label-text">такты</span>
            <div class="loop-btns">
              <button class="loop-btn active">1</button>
              <button class="loop-btn">2</button>
              <button class="loop-btn">4</button>
              <button class="loop-btn">8</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <hr class="divider">

    <!-- ABOUT / FOOTER -->
    <footer class="section about-section">
      <h2 class="section-title">о проекте</h2>
      <p class="about-text">ежедневные коллажи из фотографий. каждую ночь — новый. собирается само.</p>
      <div class="social-links">
        <!-- Instagram -->
        <a class="social-link" href="#" aria-label="Instagram">
          <svg class="social-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="24" height="24" rx="7" stroke="currentColor" stroke-width="2.5"/>
            <circle cx="16" cy="16" r="5.5" stroke="currentColor" stroke-width="2.5"/>
            <circle cx="23" cy="9" r="1.5" fill="currentColor"/>
          </svg>
          <span class="social-label">inst</span>
        </a>
        <!-- Telegram -->
        <a class="social-link" href="#" aria-label="Telegram">
          <svg class="social-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M27 6 L4 14.5 L12 17 L27 6Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
            <path d="M12 17 L15 26 L20 20 L27 6" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
            <path d="M12 17 L20 20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span class="social-label">tg</span>
        </a>
        <!-- Spotify -->
        <a class="social-link" href="#" aria-label="Spotify">
          <svg class="social-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="12" stroke="currentColor" stroke-width="2.5"/>
            <path d="M10 12 C13 10.5 19 10.5 22 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M10.5 16.5 C13 15.5 19 15.5 21.5 16.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M11 21 C13.5 20 18.5 20 21 21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span class="social-label">spotify</span>
        </a>
        <!-- Bandcamp -->
        <a class="social-link" href="#" aria-label="Bandcamp">
          <svg class="social-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 21 L12 11 L28 11 L20 21 Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
          </svg>
          <span class="social-label">bandcamp</span>
        </a>
        <!-- Email -->
        <a class="social-link" href="mailto:#" aria-label="email">
          <svg class="social-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="8" width="24" height="16" rx="3" stroke="currentColor" stroke-width="2.5"/>
            <path d="M4 11 L16 19 L28 11" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="social-label">почта</span>
        </a>
      </div>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
